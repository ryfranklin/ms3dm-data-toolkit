version: '3.8'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: ms3dm_sqlserver
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=YourStrong@Passw0rd
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
      # Note: SQL Server doesn't auto-run scripts from /docker-entrypoint-initdb.d
      # Run database/init/01-adventureworks.sh manually after container starts
      # - ./database/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P YourStrong@Passw0rd -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./config:/app/config
      - ./flows:/app/flows
      - ./results:/app/results
      - ./dags:/app/dags
    environment:
      - FLASK_ENV=development
      - FLASK_DEBUG=1
      - PORT=8000
      - SQL_SERVER_HOST=sqlserver
      - SQL_SERVER_PORT=1433
      - SQL_SERVER_USER=sa
      - SQL_SERVER_PASSWORD=YourStrong@Passw0rd
    command: python app.py
    depends_on:
      sqlserver:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
    command: npm run dev -- --host
    depends_on:
      - backend

  dagu:
    image: ghcr.io/dagu-org/dagu:latest
    container_name: ms3dm_dagu
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./dags:/var/lib/dagu/dags
      - ./dagu/data:/var/lib/dagu/data
      - ./dagu/logs:/var/lib/dagu/logs
      - ./config:/config:ro
      - ./dagu-entrypoint.sh:/entrypoint.sh:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - DAGU_HOST=0.0.0.0
      - DAGU_PORT=8080
      - DAGU_IS_BASIC_AUTH=false
      - TZ=America/New_York
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    depends_on:
      - backend
      - sqlserver

volumes:
  sqlserver_data:

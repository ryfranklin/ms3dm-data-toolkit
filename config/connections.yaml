#     name: Display Name
#     server: hostname-or-docker-service
#     port: 1433
#     database: MyDatabase
#     auth_type: sql_auth         # or "windows"
#     username: <your-user>       # required for sql_auth
#     password: <your-password>   # required for sql_auth
#     description: optional
#     active: true

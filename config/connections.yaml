# DEPRECATED — no longer loaded at runtime.
#
# Connections are now managed via the UI (Targets tab) and persisted in the
# `connections` table of the `ms3dm_metadata` SQL Server database. Add or
# edit connections through the app instead of editing this file.
#
# This file is kept only as documentation of the connection schema. Never
# commit real credentials to it.

connections: []

# Example shape for reference only — do NOT put real passwords here:

name: Build Windows release

# Triggers:
#   - Push a tag like `v1.2.3` to publish a real release.
#   - Run manually from the Actions tab to test a build without releasing.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write   # needed to upload the release asset

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install Microsoft ODBC Driver 18
        # Required at build time so PyInstaller can find pyodbc's binary deps.
        # GitHub-hosted Windows runners come with the driver pre-installed,
        # but this step is a safety net for self-hosted runners.
        shell: pwsh
        run: |
          if (-not (Get-OdbcDriver -Name 'ODBC Driver 18 for SQL Server' -ErrorAction SilentlyContinue)) {
            Write-Host "Installing ODBC Driver 18..."
            $url = 'https://go.microsoft.com/fwlink/?linkid=2249006'
            Invoke-WebRequest -Uri $url -OutFile msodbcsql.msi
            Start-Process msiexec -ArgumentList '/i','msodbcsql.msi','/qn','IACCEPTMSODBCSQLLICENSETERMS=YES' -Wait
          } else {
            Write-Host "ODBC Driver 18 already installed."
          }

      - name: Build (frontend + backend + zip)
        shell: pwsh
        run: ./build.ps1

      - name: Upload zip as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ms3dm-toolkit-windows-x64
          path: dist/ms3dm-toolkit-windows-x64.zip
          retention-days: 30

      - name: Attach to GitHub Release (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ms3dm-toolkit-windows-x64.zip
          generate_release_notes: true
          draft: false
